<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Complete Grade Database</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --success-color: #10b981;
            --fail-color: #ef4444;
            --drop-color: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            color: var(--primary-color);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            padding-top: 10px;
        }

        .logo-container img {
            max-height: 100px;
            max-width: 100%;
            object-fit: contain;
        }

        header h1 {
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            max-width: 600px;
            padding: 14px 24px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 30px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        input[type="text"]:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .student-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            padding: 25px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary-color);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .student-name {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .subject-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }

        .subject-header {
            font-weight: bold;
            background-color: #f1f5f9;
            border-radius: 6px;
            border-bottom: none;
        }

        .remarks-passed { color: var(--success-color); font-weight: bold; }
        .remarks-failed { color: var(--fail-color); font-weight: bold; }
        .remarks-drop { color: var(--drop-color); font-weight: bold; }

        .leaderboards {
            margin-top: 35px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .leaderboards { grid-template-columns: 1fr; }
            .subject-row { grid-template-columns: 1fr; gap: 8px; padding: 15px 10px; }
            .subject-header { display: none; }
        }

        .panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            padding: 22px;
        }

        .panel h3 {
            color: var(--primary-color);
            margin-top: 0;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
            font-size: 1.2rem;
        }

        .top-list { list-style: none; padding: 0; margin: 0; }
        .top-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .top-item:last-child { border-bottom: none; }
        .rank-badge {
            background-color: var(--secondary-color);
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .no-results {
            text-align: center;
            color: #64748b;
            font-style: italic;
            padding: 30px;
            background: white;
            border-radius: 12px;
        }
    </style>
</head>

    // Core Rank Data Builders
    // 1. DENSE LOGIC (Perfect for the visual top-5 widgets panel layout)
    function calculateDenseSubjectRanks(subjectCode) {
        let subjectStudents = rawGrades.filter(s => s.subject === subjectCode && !isNaN(parseFloat(s.grade)) && s.remarks.toLowerCase().includes('pass'));
        subjectStudents.sort((a, b) => parseFloat(a.grade) - parseFloat(b.grade));
        let rankMap = {};
        let currentRank = 1;
        for (let i = 0; i < subjectStudents.length; i++) {
            if (i > 0 && parseFloat(subjectStudents[i].grade) > parseFloat(subjectStudents[i-1].grade)) { currentRank++; }
            rankMap[subjectStudents[i].name] = currentRank;
        }
        return { sortedList: subjectStudents, rankMap: rankMap };
    }

    // 2. SEARCH ENGINE LOGIC (Standard Competition Rank: Sorted completely by Grade, then alphabetically by Surname)
    function calculateSearchSubjectRanks(subjectCode) {
        let subjectStudents = rawGrades.filter(s => s.subject === subjectCode && !isNaN(parseFloat(s.grade)) && s.remarks.toLowerCase().includes('pass'));
        
        // Custom Matrix Sorter: Compare grades first, if grades equal, fallback seamlessly to Surname alphabetization
        subjectStudents.sort((a, b) => {
            let gradeDiff = parseFloat(a.grade) - parseFloat(b.grade);
            if (gradeDiff !== 0) return gradeDiff;
            return a.name.localeCompare(b.name);
        });

        let rankMap = {};
        for (let i = 0; i < subjectStudents.length; i++) {
            // Assigns unique strict positioning slot index dynamically (1-indexed base)
            rankMap[subjectStudents[i].name] = i + 1;
        }
        return rankMap;
    }

    const denseCe304 = calculateDenseSubjectRanks("CE304");
    const denseEs228 = calculateDenseSubjectRanks("ES228");

    const searchCe304RankMap = calculateSearchSubjectRanks("CE304");
    const searchEs228RankMap = calculateSearchSubjectRanks("ES228");

    // Dynamic Top 5 Leaderboard Generator
    function renderTopFive(elementId, dataset) {
        const ul = document.getElementById(elementId);
        ul.innerHTML = "";
        for (let i = 0; i < dataset.sortedList.length; i++) {
            let student = dataset.sortedList[i];
            let currentRank = dataset.rankMap[student.name];
            if (currentRank > 5) break;
            let li = document.createElement("li");
            li.className = "top-item";
            li.innerHTML = `<span><span class="rank-badge">Rank ${currentRank}</span> ${student.name}</span> <strong>${student.grade}</strong>`;
            ul.appendChild(li);
        }
    }

    renderTopFive("ce304Top", denseCe304);
    renderTopFive("es228Top", denseEs228);

    // Advanced Search Profile Logic
    function searchStudent() {
        const query = document.getElementById("searchInput").value.trim().toLowerCase();
        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "";

        if (query === "") return;

        let profiles = {};

        rawGrades.forEach(record => {
            if (record.name.toLowerCase().includes(query)) {
                if (!profiles[record.name]) {
                    profiles[record.name] = [];
                }
                
                let calculatedRank = "N/A";
                if (!isNaN(parseFloat(record.grade)) && record.remarks.toLowerCase().includes('pass')) {
                    if (record.subject === "CE304") calculatedRank = searchCe304RankMap[record.name] || "N/A";
                    if (record.subject === "ES228") calculatedRank = searchEs228RankMap[record.name] || "N/A";
                }

                profiles[record.name].push({
                    subject: record.subject === "CE304" ? "CE304 Highway Engineering" : "ES228 Strength of Materials",
                    grade: record.grade,
                    remarks: record.remarks,
                    rank: calculatedRank
                });
            }
        });

        const matchedNames = Object.keys(profiles);

        if (matchedNames.length === 0) {
            resultsDiv.innerHTML = '<div class="no-results">No matches found. Check your search spelling.</div>';
            return;
        }

        matchedNames.forEach(studentName => {
            let card = document.createElement("div");
            card.className = "student-card";

            let nameHeader = document.createElement("div");
            nameHeader.className = "student-name";
            nameHeader.innerText = studentName;
            card.appendChild(nameHeader);

            let headerRow = document.createElement("div");
            headerRow.className = "subject-row subject-header";
            headerRow.innerHTML = "<div>Subject</div><div>Grade</div><div>Remarks</div><div>Class Rank</div>";
            card.appendChild(headerRow);

            profiles[studentName].forEach(sub => {
                let row = document.createElement("div");
                row.className = "subject-row";
                
                let remarkClass = "remarks-passed";
                if(sub.remarks.toLowerCase().includes('fail')) remarkClass = "remarks-failed";
                if(sub.remarks.toLowerCase().includes('drop')) remarkClass = "remarks-drop";

                let rankDisplay = sub.rank !== "N/A" ? `<span class="rank-badge">Rank ${sub.rank}</span>` : `<span class="rank-badge" style="background:#64748b;">N/A</span>`;

                row.innerHTML = `
                    <div>${sub.subject}</div>
                    <div><strong>${sub.grade}</strong></div>
                    <div class="${remarkClass}">${sub.remarks}</div>
                    <div>${rankDisplay}</div>
                `;
                card.appendChild(row);
            });

            resultsDiv.appendChild(card);
        });
    }
